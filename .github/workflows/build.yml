name: Build Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Print debug keystore SHA-1 (for Firebase console)
        run: |
          echo "=================================================================="
          echo "===== DEBUG KEYSTORE SHA-1 FINGERPRINT (copy into Firebase) ====="
          echo "=================================================================="
          keytool -list -v \
            -keystore app/keystore/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android | grep -E 'SHA1:|SHA-1:|SHA256:'
          echo "=================================================================="
          echo "Package name: com.fliptle.app"
          echo "=================================================================="

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
